services:

  # Garantiza que el volumen media_data tenga permisos correctos para appuser (uid 1000).
  # Necesario porque Docker inicializa volúmenes nuevos como root y el backend corre no-root.
  media-init:
    image: '314679576825.dkr.ecr.us-west-2.amazonaws.com/ngcourses-backend:latest'
    user: "0"
    command:
      - sh
      - -c
      - mkdir -p /app/app/media/covers /app/app/media/recursos /app/app/media/certificados && chown -R 1000:1000 /app/app/media
    volumes:
      - media_data:/app/app/media

  prestart:
    image: '314679576825.dkr.ecr.us-west-2.amazonaws.com/ngcourses-backend:latest'
    command: bash scripts/prestart.sh
    depends_on:
      media-init:
        condition: service_completed_successfully
    env_file:
      - .env.prod
    environment:
      - POSTGRES_SERVER=ngcourses-db.cri26yqcirpz.us-west-2.rds.amazonaws.com

  backend:
    image: '314679576825.dkr.ecr.us-west-2.amazonaws.com/ngcourses-backend:latest'
    restart: always
    depends_on:
      prestart:
        condition: service_completed_successfully
    env_file:
      - .env.prod
    environment:
      - POSTGRES_SERVER=ngcourses-db.cri26yqcirpz.us-west-2.rds.amazonaws.com
      - WEB_CONCURRENCY=2
      - SERVE_MEDIA=true
    ports:
      - "8000:8000"
    volumes:
      - media_data:/app/app/media
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/utils/health-check/"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    image: '314679576825.dkr.ecr.us-west-2.amazonaws.com/ngcourses-frontend:latest'
    restart: always
    ports:
      - "80:3000"
    environment:
      - BACKEND_URL=http://backend:8000
      # Poner en "true" cuando el sitio se sirva tras un dominio con HTTPS/TLS.
      # Activa 'upgrade-insecure-requests' en la CSP y el header HSTS.
      # En "false" mientras se acceda por http://<IP> (si no, se rompen los assets).
      - ENABLE_HTTPS=false
    depends_on:
      backend:
        condition: service_healthy

volumes:
  media_data:

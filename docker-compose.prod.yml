services:

  db:
    image: postgres:17
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    volumes:
      - app-db-data:/var/lib/postgresql/data/pgdata
    environment:
      - PGDATA=/var/lib/postgresql/data/pgdata
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
    networks:
      - default

  prestart:
    build:
      context: ./backend
    command: bash scripts/prestart.sh
    env_file:
      - .env.prod
    environment:
      - POSTGRES_SERVER=db
    depends_on:
      db:
        condition: service_healthy
    networks:
      - default

  backend:
    build:
      context: ./backend
    restart: always
    env_file:
      - .env.prod
    environment:
      - POSTGRES_SERVER=db
      - WEB_CONCURRENCY=2
      - SERVE_MEDIA=true
      - ENVIRONMENT=production
    volumes:
      - media_data:/app/app/media
    depends_on:
      db:
        condition: service_healthy
      prestart:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/utils/health-check/"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - traefik-public
      - default
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.constraint-label=traefik-public
      - traefik.http.services.${STACK_NAME}-backend.loadbalancer.server.port=8000
      - traefik.http.routers.${STACK_NAME}-backend-http.rule=Host(`api.${DOMAIN}`)
      - traefik.http.routers.${STACK_NAME}-backend-http.entrypoints=http
      - traefik.http.routers.${STACK_NAME}-backend-http.middlewares=https-redirect
      - traefik.http.routers.${STACK_NAME}-backend-https.rule=Host(`api.${DOMAIN}`)
      - traefik.http.routers.${STACK_NAME}-backend-https.entrypoints=https
      - traefik.http.routers.${STACK_NAME}-backend-https.tls=true
      - traefik.http.routers.${STACK_NAME}-backend-https.tls.certresolver=le

  frontend:
    build:
      context: ./frontend
      args:
        - NODE_ENV=production
    restart: always
    environment:
      - BACKEND_URL=http://backend:8000
      # Activa HSTS + upgrade-insecure-requests en next.config.ts (ya hay TLS via Traefik)
      - ENABLE_HTTPS=true
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - traefik-public
      - default
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.constraint-label=traefik-public
      - traefik.http.services.${STACK_NAME}-frontend.loadbalancer.server.port=3000
      - traefik.http.routers.${STACK_NAME}-frontend-http.rule=Host(`app.${DOMAIN}`)
      - traefik.http.routers.${STACK_NAME}-frontend-http.entrypoints=http
      - traefik.http.routers.${STACK_NAME}-frontend-http.middlewares=https-redirect
      - traefik.http.routers.${STACK_NAME}-frontend-https.rule=Host(`app.${DOMAIN}`)
      - traefik.http.routers.${STACK_NAME}-frontend-https.entrypoints=https
      - traefik.http.routers.${STACK_NAME}-frontend-https.tls=true
      - traefik.http.routers.${STACK_NAME}-frontend-https.tls.certresolver=le

volumes:
  app-db-data:
  media_data:

networks:
  traefik-public:
    external: true

services:

  prestart:
    image: '[AWS_ECR_REGISTRY_REDACTED]/ngcourses-backend:latest'
    command: bash scripts/prestart.sh
    env_file:
      - .env.prod
    environment:
      - POSTGRES_SERVER=ngcourses-db.cri26yqcirpz.us-west-2.rds.amazonaws.com

  backend:
    image: '[AWS_ECR_REGISTRY_REDACTED]/ngcourses-backend:latest'
    restart: always
    depends_on:
      prestart:
        condition: service_completed_successfully
    env_file:
      - .env.prod
    environment:
      - POSTGRES_SERVER=ngcourses-db.cri26yqcirpz.us-west-2.rds.amazonaws.com
      - WEB_CONCURRENCY=2
      - SERVE_MEDIA=true
    ports:
      - "8000:8000"
    volumes:
      - media_data:/app/app/media
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/utils/health-check/"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    image: '[AWS_ECR_REGISTRY_REDACTED]/ngcourses-frontend:latest'
    restart: always
    ports:
      - "80:3000"
    environment:
      - BACKEND_URL=http://backend:8000
      # Poner en "true" cuando el sitio se sirva tras un dominio con HTTPS/TLS.
      # Activa 'upgrade-insecure-requests' en la CSP y el header HSTS.
      # En "false" mientras se acceda por http://<IP> (si no, se rompen los assets).
      - ENABLE_HTTPS=false
    depends_on:
      backend:
        condition: service_healthy

volumes:
  media_data:

name: Deploy to AWS

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'docker-compose.prod.yml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      wipe_db:
        description: 'DESTRUCTIVO: tirar volumen de DB antes del deploy. Solo usar cuando el historial de Alembic se reescriba (ej. squash de migraciones).'
        type: boolean
        default: false

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-west-2
  ECR_REGISTRY: [AWS_ECR_REGISTRY_REDACTED]

jobs:
  build-and-push:
    name: Build & push (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: frontend
            context: ./frontend
            repo: ngcourses-frontend
          - service: backend
            context: ./backend
            repo: ngcourses-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ matrix.repo }}:latest
            ${{ env.ECR_REGISTRY }}/${{ matrix.repo }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_PAYPAL_CLIENT_ID=${{ secrets.NEXT_PUBLIC_PAYPAL_CLIENT_ID }}
            NEXT_PUBLIC_PAYPAL_MODE=${{ secrets.NEXT_PUBLIC_PAYPAL_MODE }}
            NEXT_PUBLIC_PAYPAL_CURRENCY=${{ secrets.NEXT_PUBLIC_PAYPAL_CURRENCY }}

  deploy:
    name: Deploy on EC2
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Sync backend env (.env.prod) on EC2
        env:
          PAYPAL_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_PAYPAL_CLIENT_ID }}
          PAYPAL_SECRET: ${{ secrets.PAYPAL_SECRET }}
          PAYPAL_MODE: ${{ secrets.NEXT_PUBLIC_PAYPAL_MODE }}
        run: |
          {
            printf 'PAYPAL_CLIENT_ID=%s\n' "$PAYPAL_CLIENT_ID"
            printf 'PAYPAL_SECRET=%s\n' "$PAYPAL_SECRET"
            printf 'PAYPAL_MODE=%s\n' "${PAYPAL_MODE:-sandbox}"
          } > paypal.env
          scp -i ~/.ssh/deploy_key paypal.env ec2-user@${{ secrets.EC2_HOST }}:~/paypal.env
          rm paypal.env
          ssh -i ~/.ssh/deploy_key ec2-user@${{ secrets.EC2_HOST }} bash <<'REMOTE'
          set -euo pipefail
          cd ~
          touch .env.prod
          grep -v '^PAYPAL_CLIENT_ID=\|^PAYPAL_SECRET=\|^PAYPAL_MODE=' .env.prod > .env.prod.tmp || true
          mv .env.prod.tmp .env.prod
          printf '\n' >> .env.prod
          cat paypal.env >> .env.prod
          rm paypal.env
          REMOTE

      - name: SSH and restart compose
        env:
          WIPE_DB: ${{ inputs.wipe_db }}
        run: |
          ssh -i ~/.ssh/deploy_key ec2-user@${{ secrets.EC2_HOST }} "WIPE_DB=${WIPE_DB:-false} bash -s" <<'REMOTE'
          set -euo pipefail
          cd ~

          if [ "${WIPE_DB:-false}" = "true" ]; then
            echo "!!! WIPE_DB=true: tirando containers + volumen local (media)"
            docker-compose -f docker-compose.prod.yml down -v
          fi

          echo "Login to ECR..."
          aws ecr get-login-password --region us-west-2 \
            | docker login --username AWS --password-stdin [AWS_ECR_REGISTRY_REDACTED]

          echo "Pulling new images..."
          docker-compose -f docker-compose.prod.yml pull

          if [ "${WIPE_DB:-false}" = "true" ]; then
            echo "!!! WIPE_DB=true: borrando esquema 'public' en RDS"
            docker-compose -f docker-compose.prod.yml run --rm --no-deps prestart python app/wipe_schema.py

            echo "Levantando stack completo sobre DB vacia..."
            docker-compose -f docker-compose.prod.yml up -d
          else
            echo "Recreating backend (to pick up env changes)..."
            docker-compose -f docker-compose.prod.yml up -d --force-recreate --no-deps backend

            echo "Restarting other services..."
            docker-compose -f docker-compose.prod.yml up -d
          fi

          echo "Status:"
          docker-compose -f docker-compose.prod.yml ps

          echo "Pruning dangling images..."
          docker image prune -f
          REMOTE

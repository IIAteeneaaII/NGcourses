name: Deploy to AWS

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'docker-compose.prod.yml'
      - '.github/workflows/deploy.yml'

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-west-2
  ECR_REGISTRY: 314679576825.dkr.ecr.us-west-2.amazonaws.com

jobs:
  build-and-push:
    name: Build & push (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: frontend
            context: ./frontend
            repo: ngcourses-frontend
          - service: backend
            context: ./backend
            repo: ngcourses-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ matrix.repo }}:latest
            ${{ env.ECR_REGISTRY }}/${{ matrix.repo }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    name: Deploy on EC2
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH and restart compose
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail
            cd ~

            echo "Login to ECR..."
            aws ecr get-login-password --region us-west-2 \
              | docker login --username AWS --password-stdin 314679576825.dkr.ecr.us-west-2.amazonaws.com

            echo "Pulling new images..."
            docker compose -f docker-compose.prod.yml pull

            echo "Restarting services..."
            docker compose -f docker-compose.prod.yml up -d

            echo "Status:"
            docker compose -f docker-compose.prod.yml ps

            echo "Pruning dangling images..."
            docker image prune -f

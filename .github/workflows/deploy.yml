name: Deploy to EC2 (nextgenia.lat)

# Auto-deploy a la EC2 propia (cuenta 582367504828) en cada push a main.
# Modelo B: el codigo se copia a la EC2 y se BUILDEA ahi (sin ECR).
# Requiere Secrets del repo: EC2_HOST, EC2_USER, EC2_SSH_KEY.
# El archivo .env.prod NO esta en git: debe existir ya en ~/NGcourses del server.

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'docker-compose.prod.yml'
      - 'docker-compose.traefik.yml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & deploy on EC2
    runs-on: ubuntu-latest
    env:
      EC2_USER: ${{ secrets.EC2_USER }}
      EC2_HOST: ${{ secrets.EC2_HOST }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          if [ -z "${EC2_HOST}" ] || [ -z "${EC2_USER}" ] || [ -z "${{ secrets.EC2_SSH_KEY }}" ]; then
            echo "::error::Faltan Secrets EC2_HOST / EC2_USER / EC2_SSH_KEY en el repo." >&2
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          EC2=$(printf '%s' "$EC2_HOST" | tr -d '[:space:]')
          # Limpia espacios/saltos de línea del usuario (al pegar el Secret suele
          # colarse un \n o espacio → "remote username contains invalid characters").
          USR=$(printf '%s' "$EC2_USER" | tr -d '[:space:]')
          ssh-keyscan -H "$EC2" >> ~/.ssh/known_hosts 2>/dev/null
          echo "EC2_IP=$EC2" >> "$GITHUB_ENV"
          echo "EC2_USER=$USR" >> "$GITHUB_ENV"

      - name: Package repo (commit actual)
        run: git archive --format=tar.gz -o /tmp/ngcourses.tar.gz HEAD

      - name: Copy to EC2
        run: scp -i ~/.ssh/deploy_key /tmp/ngcourses.tar.gz "${EC2_USER}@${EC2_IP}:/tmp/ngcourses.tar.gz"

      - name: Deploy (build & up on EC2)
        run: |
          ssh -i ~/.ssh/deploy_key "${EC2_USER}@${EC2_IP}" 'bash -s' <<'REMOTE'
          set -euo pipefail
          APP_DIR="$HOME/NGcourses"
          mkdir -p "$APP_DIR"

          # Limpiar codigo viejo: 'tar -x' agrega/sobrescribe pero NUNCA borra
          # archivos eliminados en git, asi que quedan "fantasmas" que rompen el
          # build (ej. paginas borradas que importan exports ya removidos). Se
          # preserva .env.prod (gitignored); la data vive en volumenes Docker,
          # no en este arbol, asi que es seguro.
          find "$APP_DIR" -mindepth 1 -maxdepth 1 ! -name '.env.prod' -exec rm -rf {} +

          # Extraer el codigo nuevo limpio (preserva .env.prod, gitignored)
          tar -xzf /tmp/ngcourses.tar.gz -C "$APP_DIR"
          rm -f /tmp/ngcourses.tar.gz
          cd "$APP_DIR"

          if [ ! -f .env.prod ]; then
            echo "ERROR: falta .env.prod en $APP_DIR (no esta en git; debe existir en el server)" >&2
            exit 1
          fi

          # docker compose v2 (plugin) o v1 (binario)
          if docker compose version >/dev/null 2>&1; then DC="docker compose"; else DC="docker-compose"; fi

          # Red externa de Traefik (idempotente)
          docker network inspect traefik-public >/dev/null 2>&1 || docker network create traefik-public

          # Asegurar Traefik arriba (no se recrea si ya corre; recrear a mano si cambia su compose)
          if ! docker ps --format '{{.Names}}' | grep -q '^ngcourses-traefik-1$'; then
            echo ">> Levantando Traefik..."
            $DC -f docker-compose.traefik.yml --env-file .env.prod up -d
          fi

          # Build + arranque de la app. 'prestart' corre las migraciones Alembic
          # automaticamente (backend depende de su finalizacion correcta).
          echo ">> Build & up de la app (esto puede tardar varios minutos)..."
          $DC -f docker-compose.prod.yml --env-file .env.prod up -d --build

          echo ">> Estado de los servicios:"
          $DC -f docker-compose.prod.yml --env-file .env.prod ps

          echo ">> Limpieza de imagenes huerfanas..."
          docker image prune -f
          REMOTE
